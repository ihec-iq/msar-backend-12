# Nixpacks configuration for Laravel 12+ application deployment
# This configuration sets up a complete environment with Nginx, PHP-FPM, and Supervisor

[phases.setup]
# Define all system packages required for the application
nixPkgs = [
  # Web server
  "nginx",
  
  # PHP runtime and extensions
  "php82",
  "php82Extensions.mbstring",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.pdo_sqlite",
  "php82Extensions.zip",
  "php82Extensions.curl",
  "php82Extensions.gd",
  "php82Extensions.intl",
  "php82Extensions.bcmath",
  
  # Build and dependency management
  "php82Packages.composer",
  "mysql-client",
  
  # Node.js for frontend compilation
  "nodejs_20",
  
  # Process management
  "python311Packages.supervisor"
]

[phases.build]
# Build phase commands - properly handling configuration copies
cmds = [
  # Install Composer dependencies
  "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev",
  
  # Create required system directories
  "mkdir -p /etc/supervisor/conf.d/",
  "mkdir -p /etc/nginx",
  "mkdir -p /etc/php-fpm"
]

[start]
# Start the application using the startup script
cmd = "/nixpacks/scripts/start.sh"

# Static assets - configuration files embedded directly in nixpacks.toml
[staticAssets]

# Nginx configuration
"nginx.conf" = '''
# Nginx configuration for Laravel application
# Optimized for containerized environments

user www-data;
worker_processes auto;
daemon off;

error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Laravel application server block
    server {
        listen 8000 default_server;
        listen [::]:8000 default_server;
        server_name _;

        root /app/public;
        index index.php index.html index.htm;

        charset utf-8;
        client_max_body_size 35M;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Static files caching
        location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            log_not_found off;
        }

        # Deny hidden files and directories
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Main routing for Laravel
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP-FPM fastcgi handler
        location ~ \.php$ {
            try_files $uri =404;

            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;

            include /etc/nginx/fastcgi_params;
            include /etc/nginx/fastcgi.conf;

            fastcgi_intercept_errors off;
            fastcgi_buffer_size 16k;
            fastcgi_buffers 4 16k;
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 60s;
            fastcgi_read_timeout 60s;
        }
    }
}
'''

# PHP-FPM configuration
"php-fpm.conf" = '''
; PHP-FPM configuration for Laravel application
; Optimized for containerized environments

[global]
; Run in foreground mode (required for containers)
daemonize = no
error_log = /dev/stderr
log_level = warning

[www]
; Listen on localhost with standard port
listen = 127.0.0.1:9000
listen.backlog = 65535

; Process user and group
user = www-data
group = www-data
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process manager - dynamic for optimal resource usage
pm = dynamic
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.process_idle_timeout = 30s
pm.max_requests = 500

; Environment variables
clear_env = no
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp

; File upload limits for Laravel
php_admin_value[post_max_size] = 35M
php_admin_value[upload_max_filesize] = 30M
php_admin_value[memory_limit] = 256M

; Logging
access.log = /dev/stdout
catch_workers_output = yes
decorate_workers_output = no
'''

# Supervisor main configuration
"supervisord.conf" = '''
; Supervisor configuration for Laravel application with nginx and PHP-FPM
; All configuration is designed to run in foreground mode for container compatibility

[unix_http_server]
file = /tmp/supervisor.sock

[supervisord]
; Run in foreground mode (required for containers)
nodaemon = true
; Send logs to stdout for container visibility
logfile = /dev/stdout
logfile_maxbytes = 0
loglevel = info
pidfile = /tmp/supervisord.pid
user = root
minfds = 1024
minprocs = 200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl = unix:///tmp/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

# Nginx worker process configuration
"worker-nginx.conf" = '''
; Supervisor configuration for Nginx process
; Manages Nginx web server lifecycle

[program:nginx]
process_name = %(program_name)s
command = /usr/sbin/nginx -c /etc/nginx/nginx.conf
user = www-data
autostart = true
autorestart = true
startsecs = 0
stopasgroup = true
killasgroup = true
priority = 10
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
'''

# PHP-FPM worker process configuration
"worker-php-fpm.conf" = '''
; Supervisor configuration for PHP-FPM process
; Manages PHP-FPM lifecycle for handling PHP requests

[program:php-fpm]
process_name = %(program_name)s
command = php-fpm -y /etc/php-fpm/php-fpm.conf -F
user = root
autostart = true
autorestart = true
startsecs = 0
stopasgroup = true
killasgroup = true
priority = 20
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
'''

# Laravel queue worker configuration (disabled by default)
"worker-laravel-queue.conf" = '''
; Supervisor configuration for Laravel Queue Worker
; Processes background jobs from the queue

[program:laravel-queue-worker]
process_name = %(program_name)s_%(process_num)02d
directory = /app
command = php artisan queue:work --sleep=3 --tries=3 --max-time=3600
user = www-data
numprocs = 1
autostart = false
autorestart = true
stopasgroup = true
killasgroup = true
startsecs = 0
stopwaitsecs = 3600
priority = 30
stdout_logfile = /dev/stdout
stdout_logfile_maxbytes = 0
stderr_logfile = /dev/stderr
stderr_logfile_maxbytes = 0
'''

# Application startup script
"start.sh" = '''
#!/usr/bin/env bash
set -e

# Container startup script for Laravel application
# Manages initialization and supervisor startup

echo "Starting Laravel application container..."

# Create required directories
mkdir -p /tmp
mkdir -p /var/log
mkdir -p /etc/nginx
mkdir -p /etc/php-fpm
mkdir -p /etc/supervisor/conf.d

# Copy configuration files from staticAssets to system locations
echo "Setting up configuration files..."

# Copy Nginx configuration
if [ -f /nixpacks/nginx.conf ]; then
    cp /nixpacks/nginx.conf /etc/nginx/nginx.conf
    chmod 644 /etc/nginx/nginx.conf
fi

# Copy PHP-FPM configuration
if [ -f /nixpacks/php-fpm.conf ]; then
    cp /nixpacks/php-fpm.conf /etc/php-fpm/php-fpm.conf
    chmod 644 /etc/php-fpm/php-fpm.conf
fi

# Copy Supervisor configuration
if [ -f /nixpacks/supervisord.conf ]; then
    cp /nixpacks/supervisord.conf /etc/supervisord.conf
    chmod 644 /etc/supervisord.conf
fi

# Copy worker configurations
for worker_file in /nixpacks/worker-*.conf; do
    if [ -f "$worker_file" ]; then
        cp "$worker_file" /etc/supervisor/conf.d/
        chmod 644 /etc/supervisor/conf.d/$(basename "$worker_file")
    fi
done

# Laravel initialization (if artisan exists)
if [ -f /app/artisan ]; then
    echo "Running Laravel initialization..."
    php /app/artisan config:cache || true
    php /app/artisan route:cache || true
    php /app/artisan view:cache || true
    php /app/artisan migrate --force || true
fi

# Start supervisor in foreground mode
echo "Starting Supervisor..."
exec /usr/bin/supervisord -c /etc/supervisord.conf
'''
